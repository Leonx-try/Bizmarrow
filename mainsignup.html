<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.3.0/css/all.min.css" integrity="sha512-59mflmEHdfG3+iNat6Jg0HZPgYcAhZ7q0VO+q50sfkQDMBpoaSJfjJU2HuH5aBeMZyTwfKB54G8hratLP3Jsow==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/remixicon/4.6.0/remixicon.css" integrity="sha512-kJlvECunwXftkPwyvHbclArO8wszgBGisiLeuDFwNM8ws+wKIw0sv1os3ClWZOcrEB2eRXULYUsm8OVRGJKwGA==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="assets/css/signup.css">
</head>
<body>
    <section>
        <div class="left-panel panel">
            <div class="title">
                <div class="icon"><span> <i class="ri-building-fill"></i></span> </div>
                <h1>UPMONEY</h1>
                <p>Micro Fiance Bank</p>
            </div>
            <div class="desc">
                <p>Best Banking and Loan Sevices</p>
                <ul>
                    <li><i class="ri-shield-check-line"></i>Secured</li>
                    <li><i class="ri-flashlight-line"></i>Fast</li>
                    <li><i class="ri-check-double-fill"></i>Reliable</li>
                </ul>
                <p><span><i class="ri-verified-badge-line"></i>Trused by Millions</span></p>
            </div>
        </div>
        <div class="panel">
            <form action="">
                <h3>Get Started</h3>
                <p>Please fill this shii</p>
                <label for="first_name">First Name</label>
                <input type="text" placeholder="Mary" id="first_name">

                <label for="last_name">Last Name</label>
                <input type="text" placeholder="mat" id="last_name">

                <label for="email">Email</label>
                <input type="email" placeholder="someone@mail.com" id="email">

                <label for="mobile_number">Mobile Number</label>
                <input type="text" placeholder="+234" id="mobile_number">

                <label for="gender">Gender</label>
                <select name="" id="gender">
                    <option value=""> --Select--</option>
                    <option value="Male"> Male</option>
                    <option value="Female"> Female</option>
                    <option value="Other"> Other</option>
                </select>

                <label for="address">Address</label>
                <textarea name="" rows="5" id="address"> No.4 First street</textarea>

                <button type="submit">Submit</button>

                <div>
                    <input type ="checkbox">
                    <span>Accept<a href="">Terms and Condition</a></span>
                </div>
                <div><a href="">Back to login</a></div>
            </form>
        </div>
    </section>
</body>
</html>
